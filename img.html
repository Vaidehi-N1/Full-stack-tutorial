<!--
img tag: It is used to display image

1)src
2)width
3)height
4)alt(alternate if image will not display it show it's name)
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<body>
    <img src="assets/images/kingfisher.jpg" width="750px" alt="kingfisher">
    <img src="assets/images/cyberpunk.jpg" width="1000px" alt="kingfisher">
    <img src="assets/images/leaves.jpg" width="900px" alt="kingfisher">
</body>
</html>
