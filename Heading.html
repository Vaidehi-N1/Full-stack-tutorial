<!--

Tags:It is used to enclosed element or content inside it .
Attribute:It is generally use to show information or property for given tag like 
style,width,height ,src,align,bgcolor

syntax:
  <tagname attribute="value">content</tagname>


  Types of Tags:
  1)Open & closing tag
  2)self-closing
  3)semantic tags
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body  bgcolor="lightblue">
    <h1 align="center">Heading 1</h1>
    <h2 align="right">Heading 2</h2>
    <h3 align="left">Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
</body>
</html>
