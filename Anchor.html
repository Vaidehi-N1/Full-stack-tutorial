<!--
Anchor tag is used to generate hyperlink .

href=>hyperlink reference(url)

syntax:
   <a href="url" target="value">element</a>


   target values:
   1)_blank->New tab
   2)parent->same tab

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Url</title>
</head>
<body>
    <a href="https://www.amazon.com" target="_blank">Amazon</a>
    <a href="https://www.microsoft.com" target="_blank">Microsoft</a>
    <a href="https://www.flipkart.com" target="_blank">Flipkart</a> <br><br>


    <a href="https://www.pexels.com/photo/serene-sea-turtle-swimming-in-hawaiian-waters-31740985/"><img src="assets/images/kingfisher.jpg" alt="" width="510px"></a>
</body>
</html>
